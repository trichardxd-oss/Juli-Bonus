<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>El Bonus de Juli</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --cream: #FAF7F0;
    --dark: #1A1508;
    --soft: #8B7355;
    --green: #3D7A56;
    --red: #9B3A3A;
    --card: #FFFDF7;
    --border: rgba(201,168,76,0.22);
    --shadow: 0 2px 16px rgba(26,21,8,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    padding-bottom: 80px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    background: var(--dark);
    padding: 32px 20px 0;
    text-align: center;
    position: relative;
  }
  .header-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); }
  .header-sub { font-size: 11px; color: var(--soft); margin-top: 3px; letter-spacing: 1.8px; text-transform: uppercase; }
  .lock-btn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: rgba(201,168,76,0.1); border: 1px solid var(--border);
    color: var(--gold); border-radius: 10px; padding: 8px 11px;
    font-size: 17px; cursor: pointer;
  }

  /* BALANCE HERO */
  .balance-hero { background: var(--dark); padding: 20px 20px 28px; text-align: center; }
  .balance-label { font-size: 11px; color: var(--soft); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .balance-amount { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700; color: var(--gold-light); line-height: 1; }
  .balance-amount.zero { color: var(--soft); }
  .balance-currency { font-size: 13px; color: var(--soft); margin-top: 6px; letter-spacing: 1px; }

  /* SUB CARDS */
  .sub-cards { background: var(--dark); padding: 0 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .sub-card { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .sub-card-label { font-size: 10px; color: var(--soft); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 5px; }
  .sub-card-amount { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
  .sub-card-amount.owed { color: #D4756A; }
  .sub-card-amount.paid { color: #6AAD85; }

  .divider { height: 6px; background: linear-gradient(to bottom, rgba(26,21,8,0.12), transparent); }

  /* STATUS */
  .status-bar { text-align: center; font-size: 12px; color: var(--soft); padding: 10px 16px 0; display: none; }
  .status-bar.visible { display: block; }

  /* SETUP BANNER */
  .setup-banner { margin: 14px; background: #1a2a1a; border: 1px solid rgba(106,173,133,0.3); border-radius: 14px; padding: 16px; display: none; }
  .setup-banner.visible { display: block; }
  .setup-banner h4 { color: #6AAD85; font-size: 14px; margin-bottom: 6px; }
  .setup-banner p { color: #8aab90; font-size: 12px; line-height: 1.5; }

  /* EDIT PANEL */
  .edit-panel { display: none; margin: 14px 14px 0; background: var(--dark); border-radius: 18px; padding: 20px; animation: slideDown 0.25s ease; }
  .edit-panel.visible { display: block; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

  .edit-title { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 17px; margin-bottom: 14px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 10px; }
  .tab { flex: 1; padding: 9px 6px; border: none; background: transparent; color: var(--soft); border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .tab.active { background: var(--gold); color: var(--dark); font-weight: 500; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: var(--soft); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .field input, .field textarea {
    width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px; padding: 11px 13px; color: var(--cream);
    font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--gold); }
  .field textarea { resize: none; height: 68px; }

  .action-btn {
    width: 100%; padding: 13px; background: var(--gold); color: var(--dark);
    border: none; border-radius: 12px; font-size: 15px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 2px;
  }
  .action-btn:active { opacity: 0.82; }

  /* HISTORY */
  .section-header { padding: 18px 16px 10px; font-size: 11px; color: var(--soft); text-transform: uppercase; letter-spacing: 1.8px; }
  .history-list { padding: 0 14px; display: flex; flex-direction: column; gap: 9px; }
  .history-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 15px;
    padding: 14px 16px; display: flex; justify-content: space-between; align-items: flex-start;
    box-shadow: var(--shadow); animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
  .history-type { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 500; margin-bottom: 3px; }
  .history-type.item { color: var(--red); }
  .history-type.pago { color: var(--green); }
  .history-desc { font-size: 14px; color: var(--dark); margin-bottom: 3px; line-height: 1.35; }
  .history-date { font-size: 11px; color: var(--soft); }
  .history-right { text-align: right; }
  .history-amount { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; white-space: nowrap; }
  .history-amount.item { color: var(--red); }
  .history-amount.pago { color: var(--green); }
  .delete-btn { font-size: 11px; color: var(--soft); background: none; border: none; cursor: pointer; margin-top: 6px; display: none; font-family: 'DM Sans', sans-serif; text-decoration: underline; }
  .edit-mode-on .delete-btn { display: block; }
  .empty-state { text-align: center; padding: 44px 20px; color: var(--soft); }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }

  /* PIN MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(10,8,2,0.88); z-index: 100; align-items: flex-end; justify-content: center; }
  .overlay.visible { display: flex; }
  .pin-modal { background: var(--dark); border: 1px solid var(--border); border-radius: 24px 24px 0 0; padding: 28px 24px 40px; width: 100%; max-width: 480px; text-align: center; animation: slideUp 0.28s ease; }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .pin-handle { width: 36px; height: 4px; background: var(--soft); border-radius: 2px; margin: 0 auto 20px; opacity: 0.4; }
  .pin-title { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 22px; margin-bottom: 4px; }
  .pin-sub { font-size: 13px; color: var(--soft); margin-bottom: 22px; }
  .pin-dots { display: flex; justify-content: center; gap: 16px; margin-bottom: 26px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--soft); background: transparent; transition: all 0.15s; }
  .pin-dot.filled { background: var(--gold); border-color: var(--gold); transform: scale(1.1); }
  .pin-error { color: #D4756A; font-size: 12px; margin-bottom: 12px; display: none; }
  .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .pin-key { background: rgba(255,255,255,0.07); border: 1px solid var(--border); border-radius: 14px; padding: 18px; font-size: 22px; color: var(--cream); cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .pin-key:active { background: var(--gold); color: var(--dark); }
  .pin-cancel { background: none; border: none; color: var(--soft); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 8px; }

  /* CONFIG MODAL */
  .cfg-overlay { display: none; position: fixed; inset: 0; background: rgba(10,8,2,0.92); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .cfg-overlay.visible { display: flex; }
  .cfg-box { background: var(--dark); border: 1px solid var(--border); border-radius: 20px; padding: 24px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
  .cfg-box h3 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 19px; margin-bottom: 6px; }
  .cfg-box p { color: var(--soft); font-size: 13px; line-height: 1.5; margin-bottom: 14px; }
  .cfg-steps { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 14px; margin-bottom: 16px; font-size: 12px; color: var(--soft); line-height: 1.8; }
  .cfg-steps b { color: var(--gold-light); }
  .cfg-link { color: var(--gold); text-decoration: none; }
</style>
</head>
<body>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  window._fbReady = false;

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyABCPfgLZYfm7wjyzKVcaFilQI58rIvxmg",
    authDomain: "juli-bonus.firebaseapp.com",
    databaseURL: "https://juli-bonus-default-rtdb.firebaseio.com",
    projectId: "juli-bonus",
    storageBucket: "juli-bonus.firebasestorage.app",
    messagingSenderId: "654773758672",
    appId: "1:654773758672:web:bc30708838f2525c5d0cd5"
  };

  window.addEventListener('load', () => {
    try {
      const app = initializeApp(FIREBASE_CONFIG);
      const db = getDatabase(app);
      const histRef = ref(db, 'julis_bonus/history');

      onValue(histRef, snap => {
        const val = snap.val();
        window._history = val
          ? Object.entries(val).map(([k,v]) => ({_key:k, ...v})).sort((a,b)=>a.ts-b.ts)
          : [];
        render();
      });

      window._addEntry = async (entry) => await push(histRef, entry);
      window._deleteEntry = async (key) => await remove(ref(db, 'julis_bonus/history/'+key));
      window._fbReady = true;

      document.getElementById('statusBar').textContent = '✓ Conectado en tiempo real';
      document.getElementById('statusBar').classList.add('visible');
      document.getElementById('setupBanner').classList.remove('visible');
    } catch(e) {
      document.getElementById('setupBanner').classList.add('visible');
      window._history = [];
      render();
    }
  });
</script>

<!-- HEADER -->
<div class="header">
  <div class="header-title">El Bonus de Juli 💛</div>
  <div class="header-sub">Seguimiento de pagos</div>
  <button class="lock-btn" id="lockBtn" onclick="handleLock()">🔒</button>
</div>

<!-- BALANCE HERO -->
<div class="balance-hero">
  <div class="balance-label">Saldo pendiente</div>
  <div class="balance-amount zero" id="heroBalance">0</div>
  <div class="balance-currency">pesos colombianos · COP</div>
</div>

<!-- SUB CARDS -->
<div class="sub-cards">
  <div class="sub-card">
    <div class="sub-card-label">Total debe</div>
    <div class="sub-card-amount owed" id="totalOwed">$ 0</div>
  </div>
  <div class="sub-card">
    <div class="sub-card-label">Total pagado</div>
    <div class="sub-card-amount paid" id="totalPaid">$ 0</div>
  </div>
</div>

<div class="divider"></div>
<div class="status-bar" id="statusBar"></div>

<div class="setup-banner" id="setupBanner" style="display:none"></div>

<!-- EDIT PANEL -->
<div class="edit-panel" id="editPanel">
  <div class="edit-title">Registrar</div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('item')">➕ Artículo</button>
    <button class="tab" onclick="switchTab('pago')">💸 Pago</button>
  </div>
  <div class="tab-content active" id="tab-item">
    <div class="field"><label>Descripción</label><textarea id="itemDesc" placeholder="Ej: Producto enviado el lunes..."></textarea></div>
    <div class="field"><label>Cantidad (unidades)</label><input type="number" id="itemQty" value="1" min="1" inputmode="numeric"></div>
    <div class="field"><label>Precio por unidad (COP $)</label><input type="number" id="itemPrice" placeholder="Ej: 95000" inputmode="numeric"></div>
    <button class="action-btn" onclick="addItem()">Agregar artículo</button>
  </div>
  <div class="tab-content" id="tab-pago">
    <div class="field"><label>Monto pagado (COP $)</label><input type="number" id="pagoAmount" placeholder="Ej: 450000" inputmode="numeric"></div>
    <div class="field"><label>Nota (opcional)</label><input type="text" id="pagoNote" placeholder="Ej: Enviado por Bancolombia"></div>
    <button class="action-btn" onclick="addPago()">Registrar pago</button>
  </div>
</div>

<!-- HISTORY -->
<div class="section-header">Historial</div>
<div class="history-list" id="historyList">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🕊️</div>
    <div>Aún no hay registros</div>
  </div>
</div>

<!-- PIN MODAL -->
<div class="overlay" id="pinOverlay">
  <div class="pin-modal">
    <div class="pin-handle"></div>
    <div class="pin-title">Acceso</div>
    <div class="pin-sub">Ingresá tu PIN para editar</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-error" id="pinError">PIN incorrecto. Intentá de nuevo.</div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key" onclick="pinPress('back')">⌫</button>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key" onclick="pinPress('clear')" style="font-size:13px">✕</button>
    </div>
    <button class="pin-cancel" onclick="closePin()">Cancelar</button>
  </div>
</div>



<script>
  const PIN = '3171';
  let pinEntry = '';
  let isUnlocked = false;
  window._history = [];
  window._addEntry = () => alert('Configurá Firebase primero.');
  window._deleteEntry = () => {};

  function formatCOP(n) { return '$ ' + Math.round(Math.abs(n)).toLocaleString('es-CO'); }
  function formatHero(n) { return Math.round(Math.abs(n)).toLocaleString('es-CO'); }
  function formatDate(ts) {
    return new Date(ts).toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function render() {
    let owed = 0, paid = 0;
    window._history.forEach(h => { if(h.type==='item') owed+=h.amount; if(h.type==='pago') paid+=h.amount; });
    const bal = owed - paid;
    const hero = document.getElementById('heroBalance');
    hero.textContent = formatHero(bal);
    hero.className = 'balance-amount' + (bal===0?' zero':'');
    document.getElementById('totalOwed').textContent = formatCOP(owed);
    document.getElementById('totalPaid').textContent = formatCOP(paid);

    const list = document.getElementById('historyList');
    Array.from(list.children).forEach(c => { if(c.id!=='emptyState') c.remove(); });
    if(window._history.length===0){ document.getElementById('emptyState').style.display='block'; return; }
    document.getElementById('emptyState').style.display='none';
    if(isUnlocked) list.classList.add('edit-mode-on'); else list.classList.remove('edit-mode-on');

    [...window._history].reverse().forEach(h => {
      const isItem = h.type==='item';
      const div = document.createElement('div');
      div.className = 'history-item';
      const desc = h.desc || (isItem ? 'Sin descripción' : (h.note||'Pago registrado'));
      div.innerHTML = `
        <div>
          <div class="history-type ${h.type}">${isItem?'Artículo':'Pago'}</div>
          <div class="history-desc">${desc}</div>
          <div class="history-date">${formatDate(h.ts)}</div>
          <button class="delete-btn" onclick="deleteEntry('${h._key}')">🗑 Eliminar</button>
        </div>
        <div class="history-right">
          <div class="history-amount ${h.type}">${isItem?'+':'−'} ${formatCOP(h.amount)}</div>
        </div>`;
      list.appendChild(div);
    });
  }

  function addItem() {
    const desc = document.getElementById('itemDesc').value.trim();
    const qty = parseInt(document.getElementById('itemQty').value)||1;
    const price = parseFloat(document.getElementById('itemPrice').value);
    if(!price||price<=0){alert('Ingresá un precio válido.');return;}
    const amount = qty*price;
    const fullDesc = qty>1 ? `${desc||'Artículo'} (x${qty} × ${formatCOP(price)})` : (desc||'Artículo');
    window._addEntry({type:'item',desc:fullDesc,amount,ts:Date.now()});
    document.getElementById('itemDesc').value='';
    document.getElementById('itemQty').value='1';
    document.getElementById('itemPrice').value='';
  }

  function addPago() {
    const amount = parseFloat(document.getElementById('pagoAmount').value);
    const note = document.getElementById('pagoNote').value.trim();
    if(!amount||amount<=0){alert('Ingresá un monto válido.');return;}
    window._addEntry({type:'pago',note,amount,ts:Date.now()});
    document.getElementById('pagoAmount').value='';
    document.getElementById('pagoNote').value='';
  }

  function deleteEntry(key) {
    if(!confirm('¿Eliminar este registro?'))return;
    window._deleteEntry(key);
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='item')||(i===1&&tab==='pago')));
    document.getElementById('tab-item').classList.toggle('active',tab==='item');
    document.getElementById('tab-pago').classList.toggle('active',tab==='pago');
  }

  function handleLock() {
    if(isUnlocked){
      isUnlocked=false;
      document.getElementById('lockBtn').textContent='🔒';
      document.getElementById('editPanel').classList.remove('visible');
      render();
    } else { openPin(); }
  }

  function openPin() {
    pinEntry=''; updatePinDots();
    document.getElementById('pinError').style.display='none';
    document.getElementById('pinOverlay').classList.add('visible');
  }

  function closePin() {
    pinEntry=''; updatePinDots();
    document.getElementById('pinOverlay').classList.remove('visible');
  }

  function pinPress(val) {
    if(val==='back') pinEntry=pinEntry.slice(0,-1);
    else if(val==='clear') pinEntry='';
    else if(pinEntry.length<4) pinEntry+=val;
    updatePinDots();
    if(pinEntry.length===4) checkPin();
  }

  function updatePinDots() {
    for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pinEntry.length);
  }

  function checkPin() {
    setTimeout(()=>{
      if(pinEntry===PIN){
        isUnlocked=true;
        document.getElementById('lockBtn').textContent='🔓';
        document.getElementById('editPanel').classList.add('visible');
        closePin();
        render();
      } else {
        document.getElementById('pinError').style.display='block';
        pinEntry=''; updatePinDots();
      }
    },200);
  }

  function saveConfig() {
    const apiKey = document.getElementById('cfgApiKey').value.trim();
    const databaseURL = document.getElementById('cfgDbUrl').value.trim();
    const projectId = document.getElementById('cfgProjectId').value.trim();
    const appId = document.getElementById('cfgAppId').value.trim();
    if(!apiKey||!databaseURL||!projectId||!appId){alert('Completá todos los campos.');return;}
    window._fbInit({apiKey,databaseURL,projectId,appId});
  }
</script>
</body>
</html>
